<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zane Allocator Benchmark</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg:       #0d0f12;
    --surface:  #151820;
    --border:   #242830;
    --text:     #e8eaf0;
    --muted:    #6b7280;
    --accent:   #7c6ff7;
    --tab-bg:   #1c2028;
    --tab-act:  #242a35;
    --info-bg:  #131820;
    --divider:  #1e242e;
    --label:    #8b92a0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 13px;
    line-height: 1.6;
    padding: 40px 32px 60px;
    max-width: 980px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 36px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 24px;
  }
  header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 6px;
  }
  header p {
    font-size: 12px;
    color: var(--muted);
  }
  header p span {
    color: var(--accent);
  }

  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 20px;
  }
  .tab {
    padding: 5px 11px;
    font-size: 11px;
    font-family: inherit;
    font-weight: 500;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--tab-bg);
    color: var(--muted);
    cursor: pointer;
    transition: all .12s;
    white-space: nowrap;
    letter-spacing: 0.01em;
  }
  .tab.on {
    background: var(--tab-act);
    color: var(--text);
    border-color: #363d4d;
  }
  .tab:hover:not(.on) { border-color: #363d4d; color: var(--text); }

  .info {
    background: var(--info-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px 18px;
    margin-bottom: 18px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0 32px;
  }
  .info-title {
    grid-column: 1 / -1;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 12px;
    letter-spacing: -0.01em;
  }
  .info-col { display: flex; flex-direction: column; gap: 5px; }
  .info-row { display: flex; gap: 10px; font-size: 11.5px; }
  .info-lbl { color: var(--label); white-space: nowrap; min-width: 104px; }
  .info-val { color: var(--text); }
  .info-div {
    grid-column: 1 / -1;
    border: none;
    border-top: 1px solid var(--divider);
    margin: 10px 0;
  }
  .info-insight {
    grid-column: 1 / -1;
    font-size: 11.5px;
    color: var(--muted);
    line-height: 1.65;
    border-left: 2px solid var(--accent);
    padding-left: 10px;
  }
  .info-insight strong { color: var(--label); font-weight: 600; }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    margin-bottom: 10px;
    font-size: 11px;
    color: var(--muted);
  }
  .litem { display: flex; align-items: center; gap: 5px; }
  .sw { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  .chart-wrap { position: relative; width: 100%; }
</style>
</head>
<body>

<header>
  <h1>Zane Allocator Benchmark</h1>
  <p><span>20 runs per test · median reported · ns precision</span> — compiled with gcc -O2</p>
</header>

<div class="tabs" id="tabs"></div>
<div class="info" id="info"></div>
<div class="legend" id="leg"></div>
<div class="chart-wrap" id="wrap"><canvas id="ch"></canvas></div>

<script>
const Z="#7c6ff7", M="#e05a3a", A="#3aab76", P="#c49a2a", G="#4a9edd", LZ="#a099e8", UL="#3aab76", CC="#c45a8a";

const TESTS=[
  {t:"T1 — seq alloc+free", title:"Sequential alloc then sequential free",
   labels:["Arena","Pool","Zane (lazy anchors)","malloc"],
   data:[34.54,476.86,657.85,1245.12],colors:[A,P,Z,M],
   meta:[{label:"Object size",val:"40B runtime (32B + 8B back-ptr slot)"},{label:"Back-ptr init",val:"0 — no anchor at creation"},{label:"Alloc cost",val:"one zm_alloc + zero-write"},{label:"Free cost",val:"read back-ptr → 0 → single zm_free"},{label:"Anchor created",val:"never — no weak refs in this test"},{label:"Runs",val:"20 — median reported"}],
   setup:"Objects created with zm_alloc_lazy: back-ptr set to 0, no anchor allocated. Free reads back-ptr, sees 0, and does a single zm_free.",
   insight:"Lazy anchors mean objects with no weak refs pay zero anchor overhead. Zane is ~1.9× faster than malloc."},

  {t:"T2 — random-order free", title:"Sequential alloc, then random-order free (only free timed)",
   labels:["Pool","Zane (lazy anchors)","malloc"],
   data:[401.20,519.83,1152.77],colors:[P,Z,M],
   meta:[{label:"Object size",val:"40B runtime"},{label:"Back-ptr",val:"0 — free is a single zm_free"},{label:"Timed phase",val:"free loop only — alloc + shuffle untimed"},{label:"Anchor overhead",val:"none — back-ptr is 0 for all objects"}],
   setup:"Alloc and shuffle are untimed. Only the free loop is timed. Back-ptr is 0 so free is one stack push per object.",
   insight:"Zane is ~2.2× faster than malloc on random-order free. Free order never matters — always one O(1) stack push."},

  {t:"T3 — mixed sizes", title:"Mixed-size alloc and random-order free",
   labels:["Arena","Zane","Pool","malloc"],
   data:[70.49,897.05,2169.03,4040.04],colors:[A,Z,P,M],
   meta:[{label:"Sizes",val:"8, 16, 32, 64 bytes — cycled evenly"},{label:"Count",val:"100,000 total (25k per size)"},{label:"Free order",val:"Fisher-Yates shuffle"},{label:"Note",val:"raw block allocs — no back-ptr slot"}],
   setup:"Raw block alloc/free of four sizes in random order.",
   insight:"Zane is ~4.5× faster than malloc. Direct size-indexed stack dispatch, no coalescing."},

  {t:"T4 — iteration", title:"Iterating 100k entity objects — five layouts",
   labels:["Inline array (store T)","CChunked (chunk=64)","UList (chunk=8)","Pointer, sequential","Pointer, shuffled"],
   data:[103.46,116.13,120.05,197.42,261.45],colors:[A,CC,UL,P,M],
   meta:[{label:"Object type",val:"Entity { id: i64, x: f64, y: f64, hp: i32 }"},{label:"Object size",val:"32 bytes"},{label:"CChunked",val:"64 elements × 32B = 2048B per chunk"},{label:"UList",val:"8 elements × 32B = 256B per chunk"},{label:"Measured op",val:"sum all hp fields (read-only scan)"},{label:"Runs",val:"20 — median reported"}],
   setup:"Five layouts iterated, no alloc/free during the timed loop.",
   insight:"Inline wins. CChunked and UList both beat pointer-chase — chunk locality matters even with inter-chunk pointer hops."},

  {t:"T5 — list growth", title:"Growing a list by appending 100k items",
   labels:["Zane in-place","CChunked (chunk=64)","UList (chunk=8)"],
   data:[123.98,256.70,1088.37],colors:[Z,CC,UL],
   meta:[{label:"Element type",val:"Entity { id: i64, x: f64, y: f64, hp: i32 }"},{label:"Zane",val:"~14 in-place frontier doublings, no malloc"},{label:"CChunked",val:"1,563 malloc calls, zero copies"},{label:"UList",val:"12,500 malloc calls, zero copies"},{label:"Runs",val:"20 — median reported"}],
   setup:"Zane doubles in-place at the frontier. CChunked and UList never copy — they allocate new chunks.",
   insight:"Zane wins because ~14 frontier bumps beats 1,563 malloc calls. CChunked is 3× faster than UList — 64-element chunks amortise malloc overhead far better."},

  {t:"T6 — anchor access", title:"Weak ref access via anchor chain vs direct pointer",
   labels:["Direct pointer","Anchor depth=1","Anchor depth=1 + null check","Anchor depth=2 (list element)"],
   data:[250.52,307.93,311.55,310.79],colors:[G,Z,LZ,CC],
   meta:[{label:"Depth=1",val:"heap_base + anchors[0].offset"},{label:"Depth=2",val:"heap_base + list_anchor.offset + element_anchor.offset"},{label:"Null sentinel",val:"0xFFFFFFFF — checked before deref"},{label:"Anchor ptrs",val:"absolute — no base arithmetic to locate them"},{label:"Anchor created",val:"lazily on first weak ref"},{label:"Runs",val:"20 — median reported"}],
   setup:"Anchors created at the point weak refs are first made. All anchors live, null check always passes.",
   insight:"Depth=1 adds ~23% over direct. Depth=2 and null-check add ~1% more each — once one anchor is cache-hot, the second and branch are nearly free."},

  {t:"T7 — game loop", title:"Simulated game loop: spawn, kill, and update entities each frame",
   labels:["Zane (lazy anchors)","Pool","malloc"],
   data:[2861.82,2819.88,3008.58],colors:[Z,P,M],
   meta:[{label:"Entity size",val:"40B (32B + 8B back-ptr)"},{label:"Anchor",val:"never created — no weak refs"},{label:"Frame count",val:"500 frames"},{label:"Spawns/frame",val:"30 new entities"},{label:"Kills/frame",val:"20 oldest + hp-drained deaths"},{label:"Runs",val:"20 — median reported"}],
   setup:"Each spawn writes back-ptr = 0. Each kill reads back-ptr (0), does single zm_free. Anchor code never executes.",
   insight:"All three within 7%. Update/iteration dominates frame time; allocator cost is a small constant."},

  {t:"T8 — particle system", title:"Particle system: burst-spawn short-lifetime objects every frame",
   labels:["Pool","Zane (lazy anchors)","malloc"],
   data:[9870.14,9965.03,10431.57],colors:[P,Z,M],
   meta:[{label:"Particle size",val:"32B (24B + 8B back-ptr)"},{label:"Anchor",val:"never created — no weak refs"},{label:"Frame count",val:"500 frames"},{label:"Spawns/frame",val:"60 particles"},{label:"Lifetime",val:"TTL = random 10–30 frames"},{label:"Runs",val:"20 — median reported"}],
   setup:"Maximum alloc/free churn. Every death reads back-ptr (0) and does single zm_free.",
   insight:"All three within 6%. Lazy anchors mean particle churn costs the same as a plain allocator."},

  {t:"T9 — fragmentation", title:"Checkerboard fragmentation then refill — only refill timed",
   labels:["Zane (lazy anchors)","Pool","malloc"],
   data:[179.48,989.04,1207.39],colors:[Z,P,M],
   meta:[{label:"Object size",val:"40B (32B + 8B back-ptr)"},{label:"Anchor",val:"never created"},{label:"Phase A (prep)",val:"alloc 100k objects"},{label:"Phase B (prep)",val:"free every even-indexed"},{label:"Phase C (timed)",val:"alloc 50k new objects"},{label:"Runs",val:"20 — median reported"}],
   setup:"Phases A+B are untimed setup. Only Phase C is timed. Free-stacks fully populated after Phase B.",
   insight:"Zane is ~6.7× faster than malloc. 50k refill = 50k O(1) free-stack pops — the most decisive result in the suite."},

  {t:"T10 — tree teardown", title:"Cascade destruction of an ownership tree from the root",
   labels:["Pool","Zane (lazy anchors)","malloc"],
   data:[84.56,142.06,90.32],colors:[P,Z,M],
   meta:[{label:"Node size",val:"sizeof(TNode) + 8B back-ptr"},{label:"Tree size",val:"~4,000 nodes"},{label:"Branching",val:"random 0–6 children per node"},{label:"Anchor",val:"never created — no weak refs"},{label:"Free cost",val:"read back-ptr (0) → single zm_free"},{label:"Runs",val:"20 — median reported"}],
   setup:"Each node freed with zm_free_lazy. Back-ptr is 0 for all nodes — no anchor was ever created. Free is a branch (back-ptr == 0) then a single zm_free.",
   insight:"Pool wins, malloc is second, Zane is slowest. The back-ptr null-check on every free adds a small constant per node that accumulates over 4,000 frees. No weak refs exist in the tree so the anchor mechanism never helps — this is the one test where the 8-byte metadata slot costs without benefit."},

  {t:"T11 — stress test", title:"Fragmentation stress: objects + lists, random spawn / push / kill cycles",
   labels:["Zane (lazy anchors)","Pool","malloc"],
   data:[2694.57,2683.59,2837.80],colors:[Z,P,M],
   meta:[{label:"Object size",val:"40B + 8B back-ptr"},{label:"List buffers",val:"256–512B + 8B back-ptr"},{label:"Anchor",val:"never created — no weak refs"},{label:"Cycles",val:"200 cycles"},{label:"Per cycle",val:"spawn + create lists + push + update + kill"},{label:"Runs",val:"20 — median reported"}],
   setup:"All alloc/free through zm_alloc_lazy / zm_free_lazy. Back-ptr always 0 — single zm_alloc / zm_free per operation.",
   insight:"All three within 6% at ~2.7ms for 200 cycles. Iteration and computation dominate in a realistic mixed workload."}
];

let chart=null;
function renderInfo(t){
  const half=Math.ceil(t.meta.length/2);
  const rows=col=>col.map(r=>`<div class="info-row"><span class="info-lbl">${r.label}</span><span class="info-val">${r.val}</span></div>`).join('');
  document.getElementById('info').innerHTML=
    `<div class="info-title">${t.title}</div>`+
    `<div class="info-col">${rows(t.meta.slice(0,half))}</div>`+
    `<div class="info-col">${rows(t.meta.slice(half))}</div>`+
    `<hr class="info-div">`+
    `<div class="info-insight"><strong>Setup: </strong>${t.setup} <strong>Key insight: </strong>${t.insight}</div>`;
}
function show(idx){
  const t=TESTS[idx];
  document.getElementById('wrap').style.height=Math.max(140,t.labels.length*54+80)+'px';
  renderInfo(t);
  document.getElementById('leg').innerHTML=t.labels.map((l,i)=>`<span class="litem"><span class="sw" style="background:${t.colors[i]}"></span>${l}</span>`).join('');
  if(chart) chart.destroy();
  chart=new Chart(document.getElementById('ch'),{
    type:'bar',
    data:{labels:t.labels,datasets:[{data:t.data,backgroundColor:t.colors,borderRadius:3,barThickness:32}]},
    options:{
      indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'#1c2230',
          borderColor:'#2e3545',
          borderWidth:1,
          titleColor:'#8b92a0',
          bodyColor:'#e8eaf0',
          callbacks:{label:ctx=>' '+ctx.parsed.x.toFixed(2)+' µs  (median of 20 runs)'}
        }
      },
      scales:{
        x:{
          title:{display:true,text:'µs — lower is faster',font:{size:11,family:'inherit'},color:'#4a5060'},
          grid:{color:'#1a2030'},
          ticks:{font:{size:11,family:'inherit'},color:'#6b7280'}
        },
        y:{
          ticks:{font:{size:11,family:'inherit'},color:'#8b92a0',autoSkip:false},
          grid:{display:false}
        }
      }
    }
  });
}
const el=document.getElementById('tabs');
TESTS.forEach((t,i)=>{
  const b=document.createElement('button');
  b.className='tab'+(i===0?' on':'');
  b.textContent=t.t;
  b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));b.classList.add('on');show(i);};
  el.appendChild(b);
});
show(0);
</script>
</body>
</html>
