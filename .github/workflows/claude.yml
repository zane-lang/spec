name: Claude

# Responds when someone mentions "@claude" on an issue or pull request.
#
# "One Claude per issue/PR" is achieved two ways:
#   * Continuity  - claude-code-action re-reads the whole issue/PR thread
#                   (including its own previous tracking comment) on every run,
#                   so each mention continues the same conversation.
#   * De-duplication - the `concurrency` group is keyed by the issue/PR number,
#                   so mentioning @claude again while a run for that same issue
#                   is still in progress will NOT start a second overlapping run.
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

# One in-flight run per issue/PR. A new @claude on the same thread while a run
# is active is dropped rather than spawning a duplicate.
concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  claude:
    # Only run when "@claude" actually appears in the triggering content.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
